<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('design.jpg') no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
}

/* CONTAINER (SUDAH DIPERBAIKI) */
#guestContainer {
    position: absolute;
    top: 47%;
    left: 30%;
    transform: translate(-50%, -50%);
    
    width: 55%;
    text-align: center;
}

/* TEXT */
#guestName {
    font-size: 60px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #d4af37;

    line-height: 1.2;
    word-break: break-word;
    white-space: normal;
    max-width: 100%;

    text-shadow: 0 3px 10px rgba(0,0,0,0.7);
}


    }

    #guestName {
        font-size: 6vw;
    }
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Our Valued Guest</h2>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

const guestRef = ref(db, "rooms/" + room);

/* 🔥 AUTO RESIZE */
function autoResizeText(el) {
    let size = 70;
    let min = 24;

    el.style.fontSize = size + "px";

    while (el.scrollWidth > el.clientWidth && size > min) {
        size -= 2;
        el.style.fontSize = size + "px";
    }
}

/* 🔥 REALTIME */
onValue(guestRef, (snapshot) => {
    const data = snapshot.val();
    const el = document.getElementById("guestName");

    if (data && data.name) {
        el.innerText = "Mr/Mrs " + data.name;
    } else {
        el.innerText = "Our Valued Guest";
    }

    setTimeout(() => {
        autoResizeText(el);
    }, 100);
});
</script>

</body>
</html>
