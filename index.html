<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND FULL SCREEN */
#bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    z-index: -1;
}

/* AREA NAMA */
#guestContainer {
    width: 55%;
    text-align: center;
    margin-left: 2%;
    margin-top: 5%;
}

#guestName {
    color: #d4af37;
    font-size: 4vw;
    font-weight: bold;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>

<!-- NAMA TAMU -->
<div id="guestContainer">
    <div id="guestName">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* AMBIL ROOM */
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

/* SET DEFAULT BACKGROUND DULU (ANTI PUTIH) */
const bg = document.getElementById("bg");
bg.style.backgroundImage = "url('assets/default.jpg')";

/* REALTIME LISTENER */
onValue(ref(db, "rooms/" + room), (snapshot) => {
    const data = snapshot.val();

    const name = data?.name || "Our Valued Guest";
    const theme = data?.theme || "default";

    console.log("Theme:", theme);

    /* LOAD GAMBAR DENGAN FALLBACK */
    const img = new Image();
    img.src = `assets/${theme}.jpg`;

    img.onload = () => {
        bg.style.backgroundImage = `url('${img.src}')`;
    };

    img.onerror = () => {
        bg.style.backgroundImage = "url('assets/default.jpg')";
    };

    /* SET NAMA */
    document.getElementById("guestName").innerText = name;
});
</script>

</body>
</html>
