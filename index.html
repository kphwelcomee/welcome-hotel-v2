<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background-size: cover;
  background-position: center;
  font-family: 'Segoe UI', sans-serif;
  position: relative;
}

/* TEXT NAMA TAMU */
#guestName {
  position: absolute;
  color: #d4af37;
  font-size: 64px;
  font-weight: bold;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<h1 id="guestName">Guest</h1>

<script>
const params = new URLSearchParams(window.location.search);

const bg = params.get("bg") || "default.jpg";
const name = params.get("name") || "Our Valued Guest";

// SET NAMA
const guest = document.getElementById("guestName");
guest.innerText = name;

// SET BACKGROUND
document.body.style.backgroundImage = `url(${bg})`;

// 🔥 MAPPING POSISI (SUDAH DISESUAIKAN DENGAN GAMBAR KAMU)
const positionMap = {
  "birthday.jpg": { x: 32, y: 62 },
  "newyear.jpg": { x: 34, y: 65 },
  "wedding.jpg": { x: 30, y: 58 },
  "default.jpg": { x: 50, y: 50 }
};

// AMBIL POSISI
const pos = positionMap[bg] || positionMap["default.jpg"];

// APPLY POSISI
guest.style.left = pos.x + "%";
guest.style.top = pos.y + "%";
</script>

</body>
</html>
