<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background-size: cover;
  background-position: center;
  font-family: 'Segoe UI', sans-serif;
  position: relative;
}

/* NAMA TAMU */
#guestName {
  position: absolute;
  color: #d4af37;
  font-weight: bold;
  text-align: center;
  transform: translate(-50%, -50%);
  text-shadow: 2px 2px 12px rgba(0,0,0,0.7);
  white-space: nowrap;
}

/* AUTO RESPONSIVE SIZE */
@media (min-width: 1920px) {
  #guestName { font-size: 70px; }
}

@media (max-width: 1919px) {
  #guestName { font-size: 48px; }
}
</style>
</head>

<body>

<h1 id="guestName">Guest</h1>

<script>
const params = new URLSearchParams(window.location.search);

// PARAM
const room = params.get("room") || "default";
const name = params.get("name") || "Our Valued Guest";

// ROOM → BACKGROUND
const roomMap = {
  "101": "wedding.jpg",
  "102": "birthday.jpg",
  "103": "newyear.jpg"
};

const bg = roomMap[room] || "default.jpg";

// SET BG
document.body.style.backgroundImage = `url(${bg})`;

// SET NAME
const guest = document.getElementById("guestName");
guest.innerText = name;

// 🔥 POSISI SUDAH DI-TUNING SESUAI GAMBAR KAMU
const positionMap = {
  "newyear.jpg":  { x: 35, y: 60 },
  "birthday.jpg": { x: 34, y: 62 },
  "wedding.jpg":  { x: 32, y: 58 },
  "default.jpg":  { x: 33, y: 60 }
};

const pos = positionMap[bg] || positionMap["default.jpg"];

// APPLY POSISI
guest.style.left = pos.x + "%";
guest.style.top = pos.y + "%";

// 🔥 AUTO SCALE kalau nama panjang
function autoResize() {
  const maxWidth = window.innerWidth * 0.4; // area kiri
  let size = 70;

  guest.style.fontSize = size + "px";

  while (guest.offsetWidth > maxWidth && size > 30) {
    size -= 2;
    guest.style.fontSize = size + "px";
  }
}

autoResize();
window.addEventListener("resize", autoResize);

</script>

</body>
</html>
