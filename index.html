<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome Hotel</title>

<style>
/* RESET */
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FRAME 16:9 (PENTING BANGET) */
.wrapper {
  position: relative;
  width: 100vw;
  max-width: 1920px;
  aspect-ratio: 16 / 9;
  overflow: hidden;

  background: url('bg.jpg') no-repeat center;
  background-size: cover;
}

/* 🔥 NAMA TAMU (FINAL POSITION) */
.guest {
  position: absolute;

  /* posisi disesuaikan dengan design kamu */
  top: 54%;
  left: 31%;

  transform: translate(-50%, -50%);

  /* ukuran pintar */
  font-size: clamp(22px, 3vw, 64px);

  color: #D4AF37;
  font-weight: 600;

  text-align: center;
  width: 38%;

  letter-spacing: 1px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.8);
}

/* 🔥 HP fallback */
@media (max-width: 768px) {
  .guest {
    top: 58%;
    left: 50%;
    width: 80%;
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div id="guestName" class="guest">Our Valued Guest</div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ambil room dari URL */
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

/* realtime data */
const guestRef = ref(db, "rooms/" + room);

onValue(guestRef, (snapshot) => {
  const data = snapshot.val();
  const el = document.getElementById("guestName");

  if (data && data.name) {
    el.innerText = "Mr/Mrs " + capitalize(data.name);
  } else {
    el.innerText = "Our Valued Guest";
  }
});

function capitalize(nama) {
  return nama.charAt(0).toUpperCase() + nama.slice(1);
}
</script>

</body>
</html>
