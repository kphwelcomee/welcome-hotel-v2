<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('design.jpg') no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
}

/* CONTAINER NAMA */
#guestContainer {
    position: absolute;
    top: 50%;
    left: 32%;
    transform: translate(-50%, -50%);
    
    width: 45%;
    text-align: center;
}

/* TEXT NAMA */
#guestName {
    font-size: clamp(28px, 3vw, 52px);
    font-weight: 600;
    color: #d4af37;
    
    line-height: 1.2;
    word-break: break-word;
    
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

/* garis bawah */
#guestName::after {
    content: "";
    display: block;
    width: 60%;
    height: 2px;
    margin: 10px auto 0;
    background: #d4af37;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Our Valued Guest</h2>
</div>

<!-- 🔥 FIREBASE REALTIME -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil nomor kamar dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

const guestRef = ref(db, "rooms/" + room);

// 🔥 REALTIME UPDATE
onValue(guestRef, (snapshot) => {
    const data = snapshot.val();
    const el = document.getElementById("guestName");

    if (data && data.name) {
        el.innerText = "Mr/Mrs " + data.name;
    } else {
        el.innerText = "Our Valued Guest";
    }
});
</script>

</body>
</html>
