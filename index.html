<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: black; /* fallback biar ga putih */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    transition: background-image 0.6s ease-in-out; /* 🔥 smooth */
}

#guestContainer {
    width: 55%;
    text-align: center;
    margin-left: 2%;
    margin-top: 5%;
}

#guestName {
    color: #d4af37;
    font-size: 4vw;
    font-weight: bold;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
}
</style>

<!-- preload biar lebih cepat -->
<link rel="preload" as="image" href="default.jpg">
<link rel="preload" as="image" href="wedding.jpg">
<link rel="preload" as="image" href="birthday.jpg">
<link rel="preload" as="image" href="newyear.jpg">

</head>

<body>

<div id="guestContainer">
    <div id="guestName">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil room dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

// fungsi load background (anti putih)
function setBackground(theme) {
    const img = new Image();

    img.src = `${theme}.jpg?v=${Date.now()}`;

    img.onload = () => {
        document.body.style.backgroundImage = `url('${img.src}')`;
    };

    img.onerror = () => {
        // fallback kalau error
        document.body.style.backgroundImage = `url('default.jpg')`;
    };
}

// realtime listener
onValue(ref(db, "rooms/" + room), (snapshot) => {
    const data = snapshot.val();

    const name = data?.name || "Our Valued Guest";
    const theme = data?.theme || "default";

    // set background aman
    setBackground(theme);

    // set nama
    document.getElementById("guestName").innerText = name;
});
</script>

</body>
</html>
