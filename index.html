<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('design.jpg') no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
}

/* CONTAINER NAMA */
#guestContainer {
    position: absolute;
    top: 48%;
    left: 35%;
    transform: translate(-50%, -50%);
    
    width: 40%;
    text-align: center;
}

/* TEXT NAMA */
#guestName {
    font-size: clamp(28px, 3vw, 52px);
    font-weight: 600;
    color: #d4af37;
    
    line-height: 1.2;
    word-break: break-word;
    
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

/* garis bawah */
#guestName::after {
    content: "";
    display: block;
    width: 60%;
    height: 2px;
    margin: 10px auto 0;
    background: #d4af37;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Our Valued Guest</h2>
</div>

<script>
// ambil nomor kamar dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

// kalau tidak ada room
if (!room) {
    document.getElementById("guestName").innerText = "Our Valued Guest";
}

// 🔥 FIX DATABASE (SUDAH BENAR)
if (room) {
    fetch(`https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app/rooms/${room}.json`)
    .then(res => res.json())
    .then(data => {
        if (data && data.name) {
            document.getElementById("guestName").innerText = "Mr/Mrs " + data.name;
        } else {
            document.getElementById("guestName").innerText = "Our Valued Guest";
        }
    })
    .catch(() => {
        document.getElementById("guestName").innerText = "Our Valued Guest";
    });
}
</script>

</body>
</html>
