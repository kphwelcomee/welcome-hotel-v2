<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome Hotel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* ✅ pakai gambar design full */
  background: url('design.jpg') no-repeat center center;
  background-size: cover;

  height: 100vh;
  overflow: hidden;
}

/* 🔥 NAMA TAMU */
.guest {
  position: absolute;

  top: 52%;
  left: 32%;

  transform: translate(-50%, -50%);

  font-size: 4vw;
  color: #D4AF37;

  font-weight: 600;
  text-align: center;

  width: 40vw;

  text-shadow: 0 3px 10px rgba(0,0,0,0.7);
}

/* 🔥 TV BESAR */
@media (min-width:1600px){
  .guest {
    font-size: 70px;
  }
}
</style>
</head>

<body>

<!-- ✅ NAMA TAMU -->
<div id="guestName" class="guest">Our Valued Guest</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil nomor kamar dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

// ambil data realtime
const guestRef = ref(db, "rooms/" + room);

onValue(guestRef, (snapshot) => {
  const data = snapshot.val();
  const el = document.getElementById("guestName");

  if (data && data.name) {
    el.innerText = "Mr/Mrs " + capitalize(data.name);
  } else {
    el.innerText = "Our Valued Guest";
  }
});

// kapital huruf depan
function capitalize(nama) {
  return nama.charAt(0).toUpperCase() + nama.slice(1);
}
</script>

</body>
</html>
