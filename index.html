<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Screen</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND IMAGE */
#bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
}

/* TEXT */
#guestContainer {
    position: absolute;
    top: 55%;
    left: 5%;
    transform: translateY(-50%);
}

#guestName {
    color: #d4af37;
    font-size: 4vw;
    font-weight: bold;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<img id="bg" src="default.jpg">

<div id="guestContainer">
    <div id="guestName">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil room dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

// realtime listener
onValue(ref(db, "rooms/" + room), (snapshot) => {
    const data = snapshot.val();

    const name = data?.name || "Our Valued Guest";
    const theme = data?.theme || "default";

    // SET BACKGROUND (INI YANG FIX)
    document.getElementById("bg").src = `${theme}.jpg?v=${Date.now()}`;

    // SET NAMA
    document.getElementById("guestName").innerText = name;
});
</script>

</body>
</html>
