<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome Hotel</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url('./design.jpg') no-repeat center center;
  background-size: cover;
  font-family: 'Segoe UI', sans-serif;
}

/* overlay */
.overlay {
  position: relative;
  width: 100%;
  height: 100%;
}

/* NAMA TAMU */
.guest {
  position: absolute;

  top: 48%;
  left: 32%;

  transform: translate(-50%, -50%);

  font-size: 52px;
  color: #D4AF37;

  font-weight: 600;
  letter-spacing: 1px;

  text-align: center;
  width: 500px;

  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="overlay">
  <div class="guest" id="guestName">Our Valued Guest</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "API_KEY_KAMU",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

const guestRef = ref(db, "rooms/" + room);

onValue(guestRef, (snapshot) => {
  const data = snapshot.val();
  const el = document.getElementById("guestName");

  if (data && data.name) {
    el.innerText = "Mr/Mrs " + data.name;
  } else {
    el.innerText = "Our Valued Guest";
  }
});
</script>

</body>
</html>
