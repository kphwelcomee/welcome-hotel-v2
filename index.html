<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Hotel</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('design.jpg') no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
}

/* CONTAINER */
#guestContainer {
    position: absolute;
    top: 45%; /* naik sedikit biar pas di bawah HOTEL */
    left: 35%;
    transform: translate(-50%, -50%);
    
    width: 40%;
    text-align: center;
}

/* TEXT NAMA */
#guestName {
    font-size: clamp(28px, 4vw, 70px);
    font-weight: 700;
    color: #d4af37;

    line-height: 1.2;
    text-align: center;

    max-width: 80%;
    margin: 0 auto;

    word-break: break-word;
}

/* RESPONSIVE TV */
@media (min-width: 1200px) {
    #guestName {
        font-size: clamp(40px, 3.5vw, 80px);
    }
}

/* HP */
@media (max-width: 768px) {
    #guestContainer {
        left: 50%;
        width: 90%;
    }

    #guestName {
        font-size: clamp(24px, 6vw, 40px);
    }
}
</style>
</head>

<body>

<div id="guestContainer">
    <h2 id="guestName">Our Valued Guest</h2>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil nomor kamar dari URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

const guestRef = ref(db, "rooms/" + room);

// 🔥 REALTIME UPDATE
onValue(guestRef, (snapshot) => {
    const data = snapshot.val();
    const el = document.getElementById("guestName");

    if (data && data.name) {
        el.innerText = "Mr/Mrs " + data.name;
    } else {
        el.innerText = "Our Valued Guest";
    }
});
</script>

</body>
</html>
