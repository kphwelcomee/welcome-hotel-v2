<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1c2c;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* CARD */
.container {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* TITLE */
h2 {
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: gold;
  color: black;
  cursor: pointer;
  margin-top: 10px;
}

/* STATUS TEXT */
.status {
  margin-top: 15px;
  font-size: 16px;
  color: lightgreen;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="container">
  <h2>Admin Input</h2>

  <input type="text" id="room" placeholder="Room Number (ex: 101)">
  <input type="text" id="name" placeholder="Guest Name">

  <button onclick="saveData()">SAVE</button>

  <div id="status" class="status">Saved ✔</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = function() {
  const room = document.getElementById("room").value.trim();
  const name = document.getElementById("name").value.trim();
  const status = document.getElementById("status");

  if (!room || !name) {
    status.innerText = "Lengkapi data!";
    status.style.color = "orange";
    status.style.opacity = 1;
    return;
  }

  set(ref(db, "rooms/" + room), {
    name: name
  });

  // tampilkan status tanpa popup
  status.innerText = "Saved ✔";
  status.style.color = "lightgreen";
  status.style.opacity = 1;

  // hilang otomatis
  setTimeout(() => {
    status.style.opacity = 0;
  }, 2000);
};
</script>

</body>
</html>
