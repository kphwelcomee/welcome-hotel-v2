<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reception Control</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #0f2a3f, #1f3d55);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
    font-size: 22px;
}

input {
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    margin-top: 10px;
}

.save {
    background: linear-gradient(90deg, #f6d365, #fda085);
    color: black;
}

.clear {
    background: #555;
    color: white;
}

button:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="container">
    <h1>Reception Control</h1>

    <input type="text" id="room" placeholder="Room Number (ex: 101)">
    <input type="text" id="name" placeholder="Guest Name">

    <button class="save" onclick="save()">SAVE</button>
    <button class="clear" onclick="clearRoom()">CLEAR ROOM</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function formatName(name) {
    return name.replace(/\b\w/g, c => c.toUpperCase());
}

window.save = function() {
    const room = document.getElementById("room").value.trim();
    let name = document.getElementById("name").value.trim();

    if (!room) return;

    name = formatName(name);

    set(ref(db, "rooms/" + room), {
        name: name
    });

    document.getElementById("name").value = "";
}

window.clearRoom = function() {
    const room = document.getElementById("room").value.trim();

    if (!room) return;

    set(ref(db, "rooms/" + room), {
        name: ""
    });
}
</script>

</body>
</html>
