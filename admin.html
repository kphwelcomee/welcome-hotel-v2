<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hotel</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b1c2c, #102c44);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 20px;
}

/* CARD */
.container {
    width: 100%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);

    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 22px;
}

/* INPUT */
input {
    width: 100%;
    padding: 18px;
    margin: 12px 0;

    font-size: 18px;
    border-radius: 12px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 18px;
    margin-top: 15px;

    font-size: 18px;
    border-radius: 12px;
    border: none;

    background: linear-gradient(135deg, #f7d774, #d4af37);
    color: black;
    font-weight: bold;

    cursor: pointer;
}

/* STATUS */
.status {
    margin-top: 15px;
    text-align: center;
    font-size: 15px;
    opacity: 0;
    transition: 0.3s;
}

/* 📱 EXTRA HP (biar makin nyaman) */
@media (max-width: 480px) {
    .container {
        padding: 25px;
    }

    input, button {
        font-size: 17px;
        padding: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Reception Control</h2>

    <input id="room" type="number" placeholder="Room Number (ex: 101)">
    <input id="name" type="text" placeholder="Guest Name">

    <button onclick="saveData()">SAVE</button>

    <div id="status" class="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURdL6FcrTEitATpSh_8LgRgcj6Fi8gw",
  authDomain: "hotel-welcome-f97c0.firebaseapp.com",
  databaseURL: "https://hotel-welcome-f97c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hotel-welcome-f97c0",
  storageBucket: "hotel-welcome-f97c0.appspot.com",
  messagingSenderId: "402476476793",
  appId: "1:402476476793:web:0c828c6086f27a004c27a8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// AUTO FOCUS
document.getElementById("room").focus();

// ENTER FLOW
document.getElementById("room").addEventListener("keypress", e => {
    if(e.key === "Enter"){
        document.getElementById("name").focus();
    }
});

document.getElementById("name").addEventListener("keypress", e => {
    if(e.key === "Enter"){
        saveData();
    }
});

window.saveData = function() {
    const room = document.getElementById("room").value.trim();
    const name = document.getElementById("name").value.trim();
    const status = document.getElementById("status");

    if (!room || !name) {
        showStatus("Lengkapi data!", "orange");
        return;
    }

    set(ref(db, "rooms/" + room), {
        name: name
    });

    localStorage.setItem("lastRoom", room);

    showStatus("Saved ✔", "lightgreen");

    document.getElementById("name").value = "";
};

// STATUS HALUS
function showStatus(text, color){
    const status = document.getElementById("status");
    status.innerText = text;
    status.style.color = color;
    status.style.opacity = 1;

    setTimeout(() => {
        status.style.opacity = 0;
    }, 1500);
}

// LOAD ROOM TERAKHIR
window.onload = function(){
    const lastRoom = localStorage.getItem("lastRoom");
    if(lastRoom){
        document.getElementById("room").value = lastRoom;
    }
};
</script>

</body>
</html>
